name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9,<11" ansible-lint

      - name: Install required Ansible collection
        run: ansible-galaxy collection install community.general

      - name: Syntax check playbook
        run: ansible-playbook playbooks/cis-hardening.yml --syntax-check -i inventory/prod/hosts.yml
